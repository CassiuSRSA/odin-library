<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="./script.js" defer></script>
  <title>Odin Library</title>
</head>
<body>
  <div class="library-container"></div>
  <dialog id="my-dialog">
    <form id="book-form">
    <h2>Add New Book</h2>
    <label for="title">Book Title</label>
    <input type="text" id="title" name="title" required>
    <label for="author">Author</label>
    <input type="text" id="author" name="author">
    <label for="pages">Number of Pages</label>
    <input type="text" id="pages" name="pages">
    <p>Have you read the book?</p>
    <input type="radio" name="read" value="true">
    <label for="read">Yes</label>
     <input type="radio" name="read"  value="false">
    <label for="not-read">No</label>
    <br>
    <button type="submit" id="add-book-btn">Add</button>
    <button type="button" id="close-modal">close</button>
    </form>
  </dialog>
  <button command="show-modal" commandfor="my-dialog">Add Book</button>
  
</body>
</html>
